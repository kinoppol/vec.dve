  componentDidMount() {
    const mq = window.matchMedia('(prefers-color-scheme: dark)');
    this.setState({ systemDark: mq.matches });
    mq.addEventListener('change', e => this.setState({ systemDark: e.matches }));
    this.loadData();
  }

  api = async (path, opts = {}) => {
    const r = await fetch('/api/' + path, {
      ...opts,
      headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
      body: opts.body ? JSON.stringify(opts.body) : undefined,
    });
    const j = await r.json();
    if (!j.success) throw new Error(j.error || 'API error');
    return j.data;
  }

  loadData = async () => {
    try {
      const [kpi, trend, prov, fields, reqs, ents, dups, fin, ppp, sup, notifs] = await Promise.all([
        this.api('kpi.php'),
        this.api('kpi.php?type=trend'),
        this.api('kpi.php?type=province'),
        this.api('kpi.php?type=fields'),
        this.api('requests.php'),
        this.api('enterprises.php'),
        this.api('enterprises.php?type=duplicates'),
        this.api('finance.php'),
        this.api('ppp.php'),
        this.api('supervision.php'),
        this.api('notifications.php'),
      ]);
      this.setState({
        dKpi: kpi, dTrend: trend, dProv: prov, dFields: fields,
        dReqs: reqs, dEnts: ents, dDups: dups, dFin: fin,
        dPpp: ppp, dSup: sup, dNotifs: notifs,
        notifN: notifs.filter(n => !n.is_read).length,
      });
    } catch (e) {
      console.warn('API unavailable, using demo data:', e.message);
    }
  }

  approveReq = async (id) => {
    try {
      await this.api('requests.php', { method: 'PATCH', body: { id, status: 'อนุมัติแล้ว' } });
      this.setState({ dReqs: this.state.dReqs.map(r => r.id === id ? { ...r, sta: 'อนุมัติแล้ว' } : r), rSel: null });
    } catch (e) { this.setState({ rSel: null }); }
  }

  rejectReq = async (id) => {

      await this.api('requests.php', { method: 'PATCH', body: { id, status: 'ปฏิเสธ' } });
      this.setState({ dReqs: this.state.dReqs.map(r => r.id === id ? { ...r, sta: 'ปฏิเสธ' } : r), rSel: null });

    } catch (e) {}
  }

  submitForm = async () => {
    const { fData, name, inst } = this.state;
    try {
      const result = await this.api('requests.php', {
        method: 'POST',
        body: {
          student_name: name || 'นายสมชาย ใจดี',
          college_name: inst || 'วิทยาลัยเทคนิคกรุงเทพ',
          enterprise_name: fData.entName,
          type: fData.type.includes('ทวิภาคี') ? 'ฝึกอาชีพ' : 'ฝึกงาน',
          period_start: fData.start,
          period_end: fData.end,
        },
      });
      this.setState({ fStep: 5, fLastCode: result.req_code || '' });
      this.loadData();
    } catch (e) { this.setState({ fStep: 5, fLastCode: '' }); }
  }

    try {

  barChart = (data,{w=400,h=170,clr='#7B1D2D'}={}) => {
    const H=this.h, c=this.c();
    const max=Math.max(...data.map(d=>d.v));
    const step=(w-52)/data.length;
    const bw=Math.min(step-5,36);
    return H('svg',{viewBox:`0 0 ${w} ${h}`,style:{width:'100%',height:'auto'}},
      ...[.25,.5,.75,1].map((t,i)=>H('line',{key:i,x1:38,y1:8+(1-t)*(h-46),x2:w-8,y2:8+(1-t)*(h-46),stroke:c.b2,strokeDasharray:'3 3'})),
      ...data.map((d,i)=>{
        const bh=Math.max(3,(d.v/max)*(h-54));
        const x=40+i*step+(step-bw)/2;
        const y=h-34-bh;
        return H('g',{key:i},
          H('rect',{x,y,width:bw,height:bh,rx:3,fill:clr,opacity:.85,style:{transformOrigin:`${x+bw/2}px ${h-34}px`}}),
          H('text',{x:x+bw/2,y:h-13,textAnchor:'middle',fontSize:8,fill:c.t3,fontFamily:'Sarabun'},d.label),

  lineChart = (data,{w=400,h=130,clr='#7B1D2D'}={}) => {
    const H=this.h, c=this.c();
    const max=Math.max(...data.map(d=>d.v))*1.05;
    const min=Math.min(...data.map(d=>d.v))*.95;
    const rng=max-min||1;
    const pts=data.map((d,i)=>({
      x:28+i*(w-48)/(data.length-1),
      y:14+(1-(d.v-min)/rng)*(h-42),
    }));
    const line=pts.map((p,i)=>`${i?'L':'M'}${p.x},${p.y}`).join(' ');
    const area=`${line}L${pts[pts.length-1].x},${h-22}L${pts[0].x},${h-22}Z`;
    return H('svg',{viewBox:`0 0 ${w} ${h}`,style:{width:'100%',height:'auto'}},
      H('path',{d:area,fill:clr,opacity:.08}),
      H('path',{d:line,stroke:clr,strokeWidth:2.5,fill:'none',strokeLinejoin:'round',strokeLinecap:'round'}),
      ...pts.map((p,i)=>H('circle',{key:i,cx:p.x,cy:p.y,r:4,fill:clr,stroke:'white',strokeWidth:2})),
      ...data.map((d,i)=>H('text',{key:`l${i}`,x:pts[i].x,y:h-6,textAnchor:'middle',fontSize:9,fill:c.t3,fontFamily:'Sarabun'},d.y)),
      ...data.map((d,i)=>H('text',{key:`v${i}`,x:pts[i].x,y:pts[i].y-8,textAnchor:'middle',fontSize:8,fill:c.tx,fontWeight:700},d.vl||'')),
    );
  }

  donut = (data,{sz=110,th=20}={}) => {
    const H=this.h, c=this.c();
    const tot=data.reduce((a,b)=>a+b.v,0);
    const cx=sz/2, cy=sz/2, r=sz/2-th/2-3;
    let st=-Math.PI/2;
    return H('svg',{viewBox:`0 0 ${sz} ${sz}`,width:sz,height:sz,style:{flexShrink:0}},
      H('circle',{cx,cy,r,fill:'none',stroke:c.PP,strokeWidth:th}),
      ...data.map((d,i)=>{
        const ang=(d.v/tot)*2*Math.PI;
        const x1=cx+r*Math.cos(st), y1=cy+r*Math.sin(st);
        const x2=cx+r*Math.cos(st+ang), y2=cy+r*Math.sin(st+ang);
        const la=ang>Math.PI?1:0;
        st+=ang;
        return H('path',{key:i,d:`M${x1},${y1}A${r},${r}0 ${la}1 ${x2},${y2}`,stroke:d.color,strokeWidth:th,fill:'none'});
      }),
    );
  }

  }

  renderVals() {
    const c=this.c();
    const{page,loggedIn}=this.state;
    let pageContent;
    if(page==='login') pageContent=this.renderLogin();
    else if(!loggedIn||page==='public') pageContent=this.renderPublic();
    else pageContent=this.renderApp();
    return {
      rootStyle:{fontFamily:"'Sarabun',sans-serif",minHeight:'100vh',background:c.bg,color:c.tx,transition:'background .3s,color .3s'},
      pageContent,
    };
  }
}
</script>
</body>
</html>
